services:
  glitchtip-github-bridge:
    build: .
    restart: always
    ports:
      - "3001:3001"
    env_file: .env
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3001/health').then(r => process.exit(r.ok ? 0 : 1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
